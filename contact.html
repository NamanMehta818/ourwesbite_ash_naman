<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact OpenSite Labs to request a free website." />
  <title>Contact · OpenSite Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html#home">
        <span class="brand--mark" aria-hidden="true">⧉</span>
        <span class="brand--text">OpenSite Labs</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
      <nav id="nav" class="nav">
        <a href="about.html">About</a>
        <a href="partners.html">Partners</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#process">Process</a>
        <a href="contact.html" class="btn btn--primary">Contact us</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section section--alt">
      <div class="container form-section">
        <div class="form-card">
          <h2>Want a website for you're own buisness?</h2>
          <p>Fill out the form and we'll be in touch within a few business days.</p>
          <form action="#" class="contact-form" onsubmit="handleSubmit(event)">
            <label>
              Your name
              <input type="text" name="name" required placeholder="e.g., Alex Smith" />
            </label>

            <label>
              Email
              <input type="email" name="email" required placeholder="name@example.com" />
            </label>

            <label>
              Organization name
              <input type="text" name="organization" required placeholder="e.g., Neighborhood Bakery" />
            </label>

            <label>
              Short project description
              <textarea name="message" rows="4" required placeholder="What do you want the site to do?"></textarea>
            </label>

            <button type="submit" class="btn btn--primary">Send request</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <div class="brand">
          <span class="brand--mark">⧉</span>
          <span class="brand--text">OpenSite Labs</span>
        </div>
        <p>Nonprofit web studio. Free, open, and built for communities.</p>

        <div class="social-links" aria-label="Social links">
          <a href="#" target="_blank" rel="noopener" aria-label="Instagram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </a>
          <a href="#" target="_blank" rel="noopener" aria-label="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
              <rect x="2" y="9" width="4" height="12"></rect>
              <circle cx="4" cy="4" r="2"></circle>
            </svg>
          </a>
          <a href="#" target="_blank" rel="noopener" aria-label="Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
            </svg>
          </a>
          <a href="#" target="_blank" rel="noopener" aria-label="YouTube">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.11 1 12 1 12s0 3.89.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.89 23 12 23 12s0-3.89-.46-5.58z"></path>
              <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
            </svg>
          </a>
        </div>
      </div>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="index.html#services">Services</a>
        <a href="contact.html">Contact us</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
